<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Instagram → Paprika</title>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }
        
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        
        .button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .button:active {
            transform: scale(0.98);
        }
        
        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .success-message {
            background: #4caf50;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }
        
        .error-message {
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }
        
        .upload-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }
        
        .upload-area.dragover {
            background: #e8ebff;
            border-color: #764ba2;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        .upload-text {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .upload-hint {
            color: #999;
            font-size: 13px;
        }
        
        #imageInput {
            display: none;
        }
        
        .preview-container {
            margin-bottom: 20px;
            display: none;
        }
        
        .preview-image {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .ocr-status {
            background: #2196F3;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        
        .ocr-status.processing {
            display: block;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: white;
            width: 0%;
            transition: width 0.3s;
            border-radius: 4px;
        }
        
        .mode-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .mode-tab {
            flex: 1;
            padding: 12px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 14px;
        }
        
        .mode-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }
        
        .mode-content {
            display: none;
        }
        
        .mode-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Instagram → Paprika</h1>
        <p class="subtitle">Rezepte von Instagram für Paprika vorbereiten</p>
        
        <!-- Modus-Auswahl -->
        <div class="mode-tabs">
            <div class="mode-tab active" onclick="switchMode('ocr')">
                📸 Screenshot OCR
            </div>
            <div class="mode-tab" onclick="switchMode('manual')">
                ⌨️ Manuell eingeben
            </div>
        </div>
        
        <!-- OCR Modus -->
        <div id="ocrMode" class="mode-content active">
            <div class="upload-area" id="uploadArea" onclick="document.getElementById('imageInput').click()">
                <div class="upload-icon">📷</div>
                <div class="upload-text">Screenshot hochladen</div>
                <div class="upload-hint">Klicken oder Bild hierher ziehen</div>
            </div>
            
            <input type="file" id="imageInput" accept="image/*">
            
            <div class="preview-container" id="previewContainer">
                <img id="previewImage" class="preview-image" alt="Vorschau">
                <button type="button" class="button" onclick="removeImage()" style="background: #f44336;">
                    🗑️ Bild entfernen
                </button>
            </div>
            
            <div class="ocr-status" id="ocrStatus">
                <div id="ocrText">📝 Texterkennung läuft...</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>
        
        <!-- Manueller Modus -->
        <div id="manualMode" class="mode-content">
            <!-- Wird später gefüllt -->
        </div>
        
        <form id="recipeForm">
            <div class="form-group">
                <label for="name">Rezeptname *</label>
                <input type="text" id="name" required placeholder="z.B. Spaghetti Carbonara">
            </div>
            
            <div class="form-group">
                <label for="ingredients">Zutaten *</label>
                <textarea id="ingredients" required placeholder="Jede Zutat in eine neue Zeile:
200 g Spaghetti
100 g Pancetta
2 Eier
..."></textarea>
                <div class="hint">Jede Zutat in eine neue Zeile</div>
            </div>
            
            <div class="form-group">
                <label for="directions">Zubereitung *</label>
                <textarea id="directions" required placeholder="Die Zubereitungsschritte:
1. Spaghetti kochen
2. Pancetta anbraten
3. ..."></textarea>
                <div class="hint">Beschreibe die Schritte zur Zubereitung</div>
            </div>
            
            <button type="submit" class="button" id="shareButton">
                📤 Als YML-Datei teilen
            </button>
        </form>
        
        <div class="success-message" id="successMessage">
            ✅ Datei erfolgreich erstellt!
        </div>
        
        <div class="error-message" id="errorMessage">
            ❌ <span id="errorText"></span>
        </div>
    </div>

    <script>
        let currentMode = 'ocr';
        let recognizedText = '';
        
        // Modus wechseln
        function switchMode(mode) {
            currentMode = mode;
            
            // Tabs aktualisieren
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Content aktualisieren
            document.querySelectorAll('.mode-content').forEach(content => {
                content.classList.remove('active');
            });
            
            if (mode === 'ocr') {
                document.getElementById('ocrMode').classList.add('active');
            } else {
                document.getElementById('manualMode').classList.add('active');
            }
        }
        
        // Drag & Drop für Upload-Bereich
        const uploadArea = document.getElementById('uploadArea');
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, preventDefaults, false);
        });
        
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        ['dragenter', 'dragover'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => {
                uploadArea.classList.add('dragover');
            });
        });
        
        ['dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, () => {
                uploadArea.classList.remove('dragover');
            });
        });
        
        uploadArea.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleImageUpload(files[0]);
            }
        });
        
        // Bild-Upload Handler
        document.getElementById('imageInput').addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleImageUpload(e.target.files[0]);
            }
        });
        
        async function handleImageUpload(file) {
            // Validierung
            if (!file.type.startsWith('image/')) {
                showError('Bitte wähle eine Bilddatei aus.');
                return;
            }
            
            // Vorschau anzeigen
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('previewImage').src = e.target.result;
                document.getElementById('previewContainer').style.display = 'block';
                document.getElementById('uploadArea').style.display = 'none';
            };
            reader.readAsDataURL(file);
            
            // OCR starten
            await performOCR(file);
        }
        
        function removeImage() {
            document.getElementById('previewContainer').style.display = 'none';
            document.getElementById('uploadArea').style.display = 'block';
            document.getElementById('imageInput').value = '';
            document.getElementById('name').value = '';
            document.getElementById('ingredients').value = '';
            document.getElementById('directions').value = '';
            recognizedText = '';
        }
        
        async function performOCR(file) {
            const ocrStatus = document.getElementById('ocrStatus');
            const ocrText = document.getElementById('ocrText');
            const progressFill = document.getElementById('progressFill');
            
            ocrStatus.classList.add('processing');
            ocrText.textContent = '📝 Texterkennung läuft...';
            progressFill.style.width = '0%';
            
            try {
                const worker = await Tesseract.createWorker('deu', 1, {
                    logger: m => {
                        if (m.status === 'recognizing text') {
                            const progress = Math.round(m.progress * 100);
                            progressFill.style.width = progress + '%';
                            ocrText.textContent = `📝 Texterkennung... ${progress}%`;
                        }
                    }
                });
                
                const { data: { text } } = await worker.recognize(file);
                await worker.terminate();
                
                recognizedText = text;
                
                // Text analysieren und in Felder aufteilen
                analyzeAndFillRecipe(text);
                
                ocrText.textContent = '✅ Texterkennung abgeschlossen!';
                progressFill.style.width = '100%';
                
                setTimeout(() => {
                    ocrStatus.classList.remove('processing');
                }, 2000);
                
            } catch (error) {
                console.error('OCR Error:', error);
                showError('Texterkennung fehlgeschlagen. Bitte versuche es erneut.');
                ocrStatus.classList.remove('processing');
            }
        }
        
        function analyzeAndFillRecipe(text) {
            // Einfache Heuristik um Rezept zu strukturieren
            const lines = text.split('\n').filter(line => line.trim().length > 0);
            
            if (lines.length === 0) {
                showError('Kein Text erkannt. Bitte versuche ein klareres Bild.');
                return;
            }
            
            // Erster nicht-leerer Text als Name
            const name = lines[0].trim();
            document.getElementById('name').value = name;
            
            // Restlichen Text als Zutaten/Anleitung
            const restText = lines.slice(1).join('\n');
            
            // Versuche Zutaten und Anleitung zu trennen
            const lowerText = restText.toLowerCase();
            
            let ingredients = '';
            let directions = '';
            
            // Suche nach typischen Trennwörtern
            const directionKeywords = ['zubereitung', 'anleitung', 'schritte', 'durchführung', 'so geht', 'ablauf'];
            const ingredientKeywords = ['zutaten', 'ingredienzen', 'du brauchst'];
            
            let ingredientsStart = -1;
            let directionsStart = -1;
            
            // Finde Positionen
            directionKeywords.forEach(keyword => {
                const pos = lowerText.indexOf(keyword);
                if (pos !== -1 && (directionsStart === -1 || pos < directionsStart)) {
                    directionsStart = pos;
                }
            });
            
            ingredientKeywords.forEach(keyword => {
                const pos = lowerText.indexOf(keyword);
                if (pos !== -1 && (ingredientsStart === -1 || pos < ingredientsStart)) {
                    ingredientsStart = pos;
                }
            });
            
            // Teile den Text auf
            if (ingredientsStart !== -1 && directionsStart !== -1) {
                if (ingredientsStart < directionsStart) {
                    ingredients = restText.substring(ingredientsStart, directionsStart).trim();
                    directions = restText.substring(directionsStart).trim();
                } else {
                    directions = restText.substring(directionsStart, ingredientsStart).trim();
                    ingredients = restText.substring(ingredientsStart).trim();
                }
            } else if (ingredientsStart !== -1) {
                ingredients = restText.substring(ingredientsStart).trim();
            } else if (directionsStart !== -1) {
                directions = restText.substring(directionsStart).trim();
            } else {
                // Fallback: Alles als Zutaten
                ingredients = restText;
            }
            
            // Entferne Überschriften
            ingredients = ingredients.replace(/^(zutaten|ingredienzen|du brauchst):?/i, '').trim();
            directions = directions.replace(/^(zubereitung|anleitung|schritte|durchführung|so geht|ablauf):?/i, '').trim();
            
            document.getElementById('ingredients').value = ingredients;
            document.getElementById('directions').value = directions;
            
            // Info anzeigen
            showSuccess('Text erkannt! Bitte überprüfe und korrigiere die Felder.');
        }
        
        document.getElementById('recipeForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Formulardaten sammeln
            const name = document.getElementById('name').value.trim();
            const ingredients = document.getElementById('ingredients').value.trim();
            const directions = document.getElementById('directions').value.trim();
            
            // Validierung
            if (!name || !ingredients || !directions) {
                showError('Bitte fülle alle Pflichtfelder aus.');
                return;
            }
            
            // YML-Datei erstellen
            const ymlContent = createYML(name, ingredients, directions);
            
            // Share-Funktion nutzen
            await shareFile(ymlContent, name);
        });
        
        function createYML(name, ingredients, directions) {
            // YAML-Format für Paprika
            let yml = `name: ${name}\n`;
            yml += `ingredients: |\n`;
            
            // Zutaten formatieren
            const ingredientLines = ingredients.split('\n').filter(line => line.trim());
            ingredientLines.forEach(line => {
                yml += `  ${line.trim()}\n`;
            });
            
            yml += `directions: |\n`;
            
            // Zubereitung formatieren
            const directionLines = directions.split('\n').filter(line => line.trim());
            directionLines.forEach(line => {
                yml += `  ${line.trim()}\n`;
            });
            
            return yml;
        }
        
        async function shareFile(content, recipeName) {
            const fileName = `${recipeName.replace(/[^a-zA-Z0-9äöüÄÖÜß\s]/g, '')}.yml`;
            
            // Blob erstellen
            const blob = new Blob([content], { type: 'text/yaml' });
            const file = new File([blob], fileName, { type: 'text/yaml' });
            
            // Prüfen ob Web Share API verfügbar ist
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'Paprika Rezept',
                        text: `Rezept: ${recipeName}`
                    });
                    showSuccess();
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        showError('Teilen fehlgeschlagen. Versuche es erneut.');
                    }
                }
            } else {
                // Fallback: Download
                downloadFile(content, fileName);
                showSuccess();
            }
        }
        
        function downloadFile(content, fileName) {
            const blob = new Blob([content], { type: 'text/yaml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        function showSuccess() {
            const msg = document.getElementById('successMessage');
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 3000);
        }
        
        function showError(text) {
            const msg = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = text;
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
